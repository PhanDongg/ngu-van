highlights_section:
  ornament: /assets/images/home/assistance1.png
  title: Điểm Nổi Bật Của Khách Hàng
  center_image: /assets/images/home/studentPic_new.png
  left_items:
    - icon: /assets/images/home/saveMoney.png
      title: Format bài giảng sáng tạo, nhân văn, ý nghĩa
      description: Hệ thống bài giảng được thiết kế theo nhiều format gần gũi như bản tin, showgame và chuyên đề để học sinh tiếp thu tự nhiên, hứng thú hơn.
    - icon: /assets/images/home/baocaotq.png
      title: Học tập tương tác độc đáo giúp con nhớ lâu
      description: Các bài học kết hợp video, trò chơi và hoạt động tương tác giúp con luyện tư duy nhanh, ghi nhớ lâu và chủ động hơn khi học.
  right_items:
    - icon: /assets/images/home/videosp.png
      title: Hành trình Học - Luyện - Thi - Chơi giúp con nhớ sâu
      description: Một lộ trình học tập được công nghệ hóa và cá nhân hóa giúp học sinh vừa học, vừa luyện tập và trải nghiệm trò chơi trí tuệ một cách tự nhiên.
    - icon: /assets/images/home/timemng.png
      title: Báo cáo kết quả học tập - đánh giá rõ ràng
      description: Kết quả học tập được cập nhật rõ ràng để phụ huynh dễ theo dõi tiến độ, mức độ chăm chỉ và điểm mạnh của con qua từng chặng học.

