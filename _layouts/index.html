<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body class="{{ page.body_class | default: 'page-competition' }}">
  {% include header.html %}

  <main class="main position-relative bg-white">
    <div class="layout container-xxl position-relative">
      <div class="row g-4 align-items-start">
        {% include sidebar.html %}

        <section class="layout__content col">
          {% include template-parts/content-page.html %}
        </section>
      </div>
    </div>
  </main>

  {% include footer.html %}
  {% include widgets/exam-rules-modal.html %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
