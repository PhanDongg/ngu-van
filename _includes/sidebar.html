<aside class="sidebar col-auto">
  <div class="sidebar__stack d-grid">
    {% for item in site.data.sidebar.boards %}
    <section class="sidebar__board{% if item.highlight %} sidebar__board--highlight{% endif %}">
      <div class="sidebar__board-wrapper">
        <h3 class="sidebar__board-title fw-bold">{{ item.title }}</h3>
        {% if item.subtitle %}
        <p class="sidebar__board-subtitle">{{ item.subtitle }}</p>
        {% endif %}
        {% if item.round_count %}
        <span class="sidebar__board-meta">{{ item.round_count }}</span>
        {% endif %}
      </div>

      {% if item.children %}
      <ul class="sidebar__board-list list-unstyled">
        {% for child in item.children %}
        <li>{{ child }}</li>
        {% endfor %}
      </ul>
      {% endif %}
    </section>
    {% endfor %}
  </div>

  <section class="sidebar__promo">
    <img class="sidebar__promo-image" src="{{ '/assets/images/sidebar-desktop.webp' | relative_url }}"
      alt="Hệ thống học Toán K-12 TNMath">
  </section>
</aside>
