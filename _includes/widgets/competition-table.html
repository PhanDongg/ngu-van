{% assign competition = site.data.competition %}
<section class="competition-page__table position-relative">
  <div class="competition-page__round-table d-grid" role="table" aria-label="Danh sách vòng thi">
    <div class="competition-page__round-row competition-page__round-row--head d-grid align-items-center gap-sm-3 gap-2" role="row">
      {% for heading in competition.table_headings %}
      <span role="columnheader">{{ heading }}</span>
      {% endfor %}
    </div>

    {% for round in competition.rounds %}
    <div class="competition-page__round-row d-grid align-items-center gap-3{% if round.current %} competition-page__round-row--current competition-page__round-row--launch{% endif %}"
      role="row"{% if round.current %} tabindex="0" aria-label="Mở quy chế khảo thí vòng hiện tại" data-bs-toggle="modal" data-bs-target="#{{ competition.exam_rules.modal_id }}"{% endif %}>
      <span role="cell">{{ round.index }}</span>
      <span role="cell">{{ round.label }}</span>
      <span role="cell">{{ round.opens }}</span>
      <span role="cell">{{ round.closes }}</span>
      <span class="competition-page__round-status{% if round.complete %} competition-page__round-status--complete{% endif %}" role="cell"
        aria-label="{% if round.complete %}Đã hoàn thành{% else %}Chưa hoàn thành{% endif %}">
        <i class="d-inline-flex align-items-center justify-content-center">✓</i>
      </span>
    </div>
    {% endfor %}
  </div>
</section>
