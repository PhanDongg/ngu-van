{% assign competition = site.data.competition %}
<section class="competition-page__table">
  <div class="competition-page__round-table" role="table" aria-label="Danh sách vòng thi">
    <div class="competition-page__round-row competition-page__round-row--head" role="row">
      {% for heading in competition.table_headings %}
      <span role="columnheader">{{ heading }}</span>
      {% endfor %}
    </div>

    {% for round in competition.rounds %}
    <div class="competition-page__round-row{% if round.current %} competition-page__round-row--current{% endif %}"
      role="row">
      <span role="cell">{{ round.index }}</span>
      <span role="cell">{{ round.label }}</span>
      <span role="cell">{{ round.opens }}</span>
      <span role="cell">{{ round.closes }}</span>
      <span class="competition-page__round-status{% if round.complete %} competition-page__round-status--complete{% endif %}" role="cell"
        aria-label="{% if round.complete %}Đã hoàn thành{% else %}Chưa hoàn thành{% endif %}">
        <i class="d-inline-flex align-items-center justify-content-center">✓</i>
      </span>
    </div>
    {% endfor %}
  </div>
</section>
